<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion - A.MO.D GESTION</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f4f4; }
        .login-box { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Accès A.MO.D</h2>
        <input type="text" id="telephone" placeholder="Entrez votre numéro de téléphone">
        <button onclick="verifierLicence()">Se connecter</button>
        <p id="message"></p>
    </div>

    <script>
        async function verifierLicence() {
            const tel = document.getElementById('telephone').value;
            const response = await fetch('/api/verifier-licence', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ telephone: tel })
            });

            if (response.ok) {
                window.location.href = '/'; // Redirige vers le tableau de bord
            } else {
                document.getElementById('message').innerText = "Accès refusé ou licence expirée.";
            }
        }
    </script>
</body>
</html>
